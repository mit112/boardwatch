name: registry-health
on:
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC
  workflow_dispatch: {}
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv && uv sync
      # exits non-zero iff DEAD/ERROR/UNREACHABLE → drift is visible; EMPTY passes (§3.2-valid)
      - run: uv run python -m boardwatch.registry.health_report
