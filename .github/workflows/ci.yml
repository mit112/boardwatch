name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  test:
    name: test (${{ matrix.python }}, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Full 3-OS matrix only on push to main (the pre-permanent safety net).
        # PRs run ubuntu-only to conserve Free-tier minutes (macOS bills 10x,
        # Windows 2x). OS-specific risk is re-verified at the main merge.
        os: ${{ github.event_name == 'push' && fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') || fromJSON('["ubuntu-latest"]') }}
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run mypy --strict src
      - run: uv run pytest

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  perf:
    name: perf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen
      - run: uv run pytest tests/perf -m perf --no-cov -s
